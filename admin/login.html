<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acesso Administrativo — Ponto do Espetinho</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/login.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <img src="/logomarca.png" alt="Ponto do Espetinho" />
      </div>

      <h1 class="login-title">Área Administrativa</h1>
      <p class="login-sub">Acesso restrito ao proprietário</p>

      <form id="loginForm" novalidate>

        <div class="field">
          <label for="username" class="field-label">Usuário</label>
          <input
            type="text"
            id="username"
            name="username"
            class="field-input"
            autocomplete="username"
            placeholder="Seu usuário"
            spellcheck="false"
            required
          />
        </div>

        <div class="field">
          <label for="password" class="field-label">Senha</label>
          <div class="field-password">
            <input
              type="password"
              id="password"
              name="password"
              class="field-input"
              autocomplete="current-password"
              placeholder="Sua senha"
              required
            />
            <button type="button" id="togglePass" class="field-eye" aria-label="Mostrar senha">
              <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg class="eye-close" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
                style="display:none">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="loginError" class="login-error" role="alert" hidden></div>

        <button type="submit" id="loginBtn" class="login-btn">
          <span id="loginBtnText">Entrar</span>
          <span id="loginSpinner" class="spinner" hidden></span>
        </button>

      </form>
    </div>
  </div>

  <script type="module" src="/src/js/admin/login.js"></script>
</body>
</html>
