<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Cardápio — Ponto do Espetinho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="/src/styles/menu.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="menu-header">
    <div class="header-logo">🔥</div>
    <div class="header-info">
      <h1 class="header-name">Ponto do Espetinho</h1>
      <p class="header-sub">Seg – Sáb &nbsp;·&nbsp; 18h às 22h</p>
      <span class="header-tag">● Aberto agora</span>
    </div>
  </header>

  <!-- ── CATEGORY TABS ── -->
  <nav class="cat-tabs" id="catTabs"></nav>

  <!-- ── PRODUCT LIST ── -->
  <main class="menu-main" id="menuMain">
    <div class="loading">Carregando cardápio…</div>
  </main>

  <!-- ── CART BAR (floating) ── -->
  <div class="cart-bar" id="cartBar">
    <div class="cart-bar-info">
      <span class="cb-count" id="cbCount">0 itens</span>
      <span class="cb-total" id="cbTotal">R$ 0,00</span>
    </div>
    <button class="cb-btn" id="cartBtn">🛒 Ver pedido</button>
  </div>

  <!-- ── CART MODAL ── -->
  <div class="modal-overlay" id="cartOverlay">
    <div class="cart-sheet">
      <div class="sheet-header">
        <h2>Seu Pedido</h2>
        <button class="sheet-close" id="cartClose" aria-label="Fechar">✕</button>
      </div>
      <div class="sheet-body" id="cartItems"></div>
      <div class="sheet-footer">
        <div class="name-row">
          <label class="name-label" for="clienteNome">Seu nome</label>
          <input id="clienteNome" class="name-input" type="text"
            placeholder="Como devemos te chamar?" autocomplete="given-name" maxlength="60" />
        </div>
        <div class="pay-row">
          <span class="name-label">Pagamento</span>
          <div class="pay-toggle">
            <button class="pay-btn active" id="payDinheiro" data-pay="dinheiro">💵 Dinheiro</button>
            <button class="pay-btn"        id="payPix"      data-pay="pix">   PIX</button>
          </div>
          <div class="pix-info" id="pixInfo">
            <span class="pix-label">Chave PIX <span class="pix-hint">toque para copiar</span></span>
            <span class="pix-key" id="pixKey" role="button" title="Copiar chave PIX">
              75981806299 <small>(celular)</small>
              <span class="pix-copied" id="pixCopied">✓ Copiado!</span>
            </span>
          </div>
        </div>
        <div class="total-row">
          <span>Total</span>
          <strong id="cartTotalModal">R$ 0,00</strong>
        </div>
        <button class="wpp-btn" id="wppBtn">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
          Pedir pelo WhatsApp
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/js/cardapio/cardapio.js"></script>
</body>
</html>
